<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Park Sibiu</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body { margin: 0; height: 100%; padding: 0; }
    #map { width: 100%; height: 70%; }
    #parking-section { 
      padding: 20px; 
      height: 30%; 
      overflow-y: auto;  /*for scorlling if needed*/
      background: #f9f9f9;
    }
    ul { list-style: none; padding: 0; }
    li { margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
  </style>
</head>
<body>

  <div id="map"></div>

    <div id="parking-section">
    <h2>Available Parkings</h2>

   <div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
    <input type="text" id="searchInput" placeholder="Caută după nume..." 
           style="padding: 8px; border-radius: 4px; border: 1px solid #ccc; flex: 1; min-width: 200px;">
    
    <select id="priceFilter" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        <option value="all">Toate prețurile</option>
        <option value="5">Maxim 5 RON/h</option>
        <option value="10">Maxim 10 RON/h</option>
        <option value="15">Maxim 15 RON/h</option>
    </select>

    <select id="sortOptions" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        <option value="none">Sortează după...</option>
        <option value="priceAsc">Preț: Mic la Mare</option>
        <option value="priceDesc">Preț: Mare la Mic</option>
        <option value="spots">Cele mai multe locuri libere</option>
    </select>

    <label style="font-size: 14px; cursor: pointer;">
        <input type="checkbox" id="availableOnly"> Doar locuri libere
    </label>
</div>

    <ul id="parkingList">
        <li>Loading parkings...</li>
    </ul>
</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module" src="../backend/script.js"></script>

  <script type="module" src="../backend/parking.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Park Sibiu</title>
    <link rel="stylesheet" href="profile-styles.css">
    <link rel="icon" href="../graphics/park-icon-unsigned.png" />
</head>

<body id="app-body">
    <div id="profile-container" class="profile-container">
        <button id="mapBtn"><a href="index.html">Map</a></button>
        <button id="logoutBtn">Logout</button>
    </div>

    <div class="profile-main">
        <div class="information-container">
            <h1>Profile Settings</h1>

            <div class="section-card">
                <h3>Personal Information</h3>
                <section>
                    <label for="displayName">Display Name:</label>
                    <input type="text" id="displayName" placeholder="Enter your name">
                    <button id="saveNameBtn">Save Name</button>
                    <input type="text" id="newPlateInput" placeholder="Ex: AA00XYZ">
                    <button id="addPlateBtn">Add Plate</button>
                    <ul id="platesList" style="list-style: none; padding: 0; margin-top: 10px;"> </ul>
                </section>
            </div>

            <div class="section-card">
                <h3>Preferences</h3>
                <section>
                    <div>
                        <label for="languageSelect">Language:</label>
                        <select id="languageSelect">
                            <option value="en">English</option>
                            <option value="ro">Romanian</option>
                        </select>
                    </div>
                    <div>
                        <label for="darkModeToggle">Dark Mode:</label>
                        <input type="checkbox" id="darkModeToggle">
                    </div>
                </section>
            </div>

            <div class="section-card">
                <h3>Security</h3>
                <section>
                    <button id="resetPasswordBtn">Send Password Reset Email</button>
                </section>
            </div>
        </div>

        <div class="image-panel">
            <div class="image-placeholder"></div>
        </div>
    </div>

    <script type="module" src="../backend/profile.js"></script>
</body>

</html>

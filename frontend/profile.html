<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Park Sibiu</title>
    <link rel="stylesheet" href="profile-styles.css">
    <link rel="icon" href="../graphics/park-icon-unsigned.png" />
</head>

<body id="app-body">
    <div id="profile-container" class="profile-container">
        <button id="mapBtn"><a href="index.html" data-i18n="nav_map">Map</a></button>
        <button id="logoutBtn" data-i18n="nav_logout">Logout</button>
    </div>

    <div class="profile-main">
        <div class="information-container">
            <h1 data-i18n="profile_settings">Profile Settings</h1>

            <div class="section-card">
                <h3 data-i18n="personal_info">Personal Information</h3>
                <section>
                    <label for="displayName" data-i18n="display_name_label">Display Name:</label>
                    <input type="text" id="displayName" placeholder="Enter your name">
                    <button id="saveNameBtn" data-i18n="save_name_btn">Save Name</button>
                    <input type="text" id="newPlateInput" placeholder="Ex: AA00XYZ">
                    <button id="addPlateBtn" data-i18n="add_plate_btn">Add Plate</button>
                </section>
            </div>

            <div class="section-card">
                <h3 data-i18n="preferences_title">Preferences</h3>
                <section>
                    <div>
                        <label for="languageSelect" data-i18n="language_label">Language:</label>
                        <select id="languageSelect">
                            <option value="en">English</option>
                            <option value="ro">Romanian</option>
                        </select>
                    </div>
                    <div>
                        <label for="darkModeToggle" data-i18n="dark_mode_label">Dark Mode:</label>
                        <input type="checkbox" id="darkModeToggle">
                    </div>
                </section>
            </div>

            <div class="section-card">
                <h3 data-i18n="security_title">Security</h3>
                <section>
                    <button id="resetPasswordBtn" data-i18n="reset_pass_btn">Send Password Reset Email</button>
                </section>
            </div>
        </div>

        <div class="image-panel">
            <div class="image-placeholder"></div>
        </div>
    </div>

    <script type="module" src="../backend/profile.js"></script>
</body>

</html>
